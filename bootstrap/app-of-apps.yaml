apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: app-of-apps
  namespace: argocd
  # Prevents ArgoCD from deleting this app accidentally
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/deploydaily/k8s.git
    targetRevision: HEAD
    # ArgoCD watches this folder for ApplicationSet YAMLs
    # Any YAML you add here gets applied automatically
    path: applicationsets
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true